<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拼音组合探索器</title>
<style>
:root {
  --bg:#f5f7fa;--surface:#fff;--text:#1a1a2e;--text-secondary:#6b7280;
  --matrix-bg:#e8f5e9;--matrix-hover:#c8e6c9;--matrix-active:#4caf50;
  --invalid-bg:#f3f4f6;--border:#e5e7eb;--shadow:0 2px 12px rgba(0,0,0,.08);
  --accent:#3b82f6;--header-bg:#37474f;--search-bg:#fff;
}
[data-theme="dark"]{
  --bg:#1a1a2e;--surface:#16213e;--text:#e0e0e0;--text-secondary:#9ca3af;
  --matrix-bg:#1b5e20;--matrix-hover:#2e7d32;--matrix-active:#66bb6a;
  --invalid-bg:#2d2d44;--border:#374151;--shadow:0 2px 12px rgba(0,0,0,.3);
  --accent:#60a5fa;--header-bg:#0f3460;--search-bg:#1e293b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header h1{font-size:1.3rem;font-weight:700}
.search-box{display:flex;gap:8px;align-items:center}
.search-box input{padding:8px 14px;border:2px solid var(--border);border-radius:8px;font-size:14px;width:260px;background:var(--search-bg);color:var(--text);outline:none;transition:border-color .3s}
.search-box input:focus{border-color:var(--accent)}
.theme-toggle{width:40px;height:40px;border-radius:50%;border:2px solid var(--border);background:var(--surface);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .3s}
.theme-toggle:hover{border-color:var(--accent);transform:rotate(20deg)}
.stats-bar{display:flex;gap:16px;padding:8px 20px;font-size:.8rem;color:var(--text-secondary);background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
.legend{padding:12px 20px;display:flex;gap:16px;font-size:.8rem;color:var(--text-secondary);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-color{width:16px;height:16px;border-radius:3px}
.matrix-container{padding:16px 20px;overflow-x:auto}
.matrix-wrapper{min-width:900px;display:grid;grid-template-columns:72px repeat(35,minmax(48px,1fr));gap:1px;background:var(--border);border-radius:10px;overflow:hidden}
.matrix-header{padding:10px 4px;text-align:center;font-size:13px;font-weight:700;color:#fff;background:var(--header-bg);display:flex;align-items:center;justify-content:center;line-height:1.2}
.matrix-corner{background:var(--header-bg)}
.matrix-row-label{padding:8px 6px;font-size:13px;font-weight:700;text-align:center;color:#fff;background:var(--header-bg);display:flex;align-items:center;justify-content:center;line-height:1.2}
.matrix-cell{padding:6px 2px;text-align:center;cursor:default;font-size:13px;display:flex;align-items:center;justify-content:center;line-height:1.2;min-height:40px;transition:all .15s}
.matrix-cell.invalid{background:var(--invalid-bg);cursor:not-allowed;color:#bbb}
.matrix-cell.valid{background:var(--matrix-bg);cursor:pointer;color:#fff;font-weight:600}
.matrix-cell.valid:hover{background:var(--matrix-hover);transform:scale(1.05);z-index:2;box-shadow:inset 0 0 0 2px var(--accent)}
.matrix-cell.valid.active{background:var(--matrix-active);transform:scale(1.08);z-index:3;box-shadow:0 0 0 2px var(--text)}
.matrix-cell .pinyin-syllable{font-size:12px;line-height:1.1}
.detail-panel{padding:0 20px 20px}
.detail-inner{background:var(--surface);border-radius:12px;box-shadow:var(--shadow);padding:20px;margin-top:4px;border:2px solid transparent;transition:border .3s}
.detail-inner.active{border-color:var(--accent)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-secondary)}
.empty-state .icon{font-size:3rem;margin-bottom:12px}
.detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.detail-title{font-size:2rem;font-weight:800;color:var(--accent)}
.detail-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--invalid-bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.detail-close:hover{background:#ef4444;color:#fff}
.tone-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.tone-card{background:var(--bg);border-radius:8px;padding:14px;border-left:4px solid transparent}
.tone-card[data-tone="1"]{border-left-color:#ef4444}
.tone-card[data-tone="2"]{border-left-color:#f59e0b}
.tone-card[data-tone="3"]{border-left-color:#3b82f6}
.tone-card[data-tone="4"]{border-left-color:#10b981}
.tone-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.tone-label{font-size:.75rem;color:var(--text-secondary);font-weight:600}
.speak-btn{width:32px;height:32px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.speak-btn:hover{transform:scale(1.15);box-shadow:0 2px 8px rgba(59,130,246,.4)}
.tone-syllable{font-size:1.8rem;font-weight:700;margin-bottom:4px}
.words-section h3{font-size:.85rem;color:var(--text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.words-list{display:flex;flex-wrap:wrap;gap:6px}
.word-tag{padding:4px 12px;background:var(--bg);border-radius:16px;font-size:.9rem;cursor:pointer;transition:all .2s;border:1px solid var(--border)}
.word-tag:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:scale(1.05)}
.cell-tooltip{position:fixed;background:var(--header-bg);color:#fff;padding:6px 12px;border-radius:6px;font-size:13px;pointer-events:none;z-index:999;opacity:0;transition:opacity .15s;max-width:240px;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.cell-tooltip.visible{opacity:1}
@media(max-width:768px){.header{flex-direction:column;gap:10px}.search-box input{width:200px}.tone-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <h1>🔤 拼音组合探索器</h1>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索拼音或汉字（如：ba、八）...">
    <button class="theme-toggle" id="themeToggle" title="切换深色模式">🌙</button>
  </div>
</div>

<div class="stats-bar">
  <span>✅ 有效音节: <strong id="validCount">0</strong></span>
  <span>❌ 无效组合: <strong id="invalidCount">0</strong></span>
  <span>📊 矩阵: 23声母 × 35韵母 = 805格</span>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-color" style="background:var(--matrix-bg)"></div>有效组合（可点击）</div>
  <div class="legend-item"><div class="legend-color" style="background:var(--invalid-bg)"></div>无效组合</div>
  <div class="legend-item">💡 点击格子查看详情 + 听发音</div>
</div>

<div class="matrix-container">
  <div class="matrix-wrapper" id="matrixWrapper"></div>
</div>

<div class="detail-panel">
  <div class="detail-inner" id="detailPanel">
    <div class="empty-state" id="emptyState">
      <div class="icon">🎯</div>
      <p>点击矩阵中的绿色格子<br>查看该音节的四声读法和常用词语</p>
    </div>
    <div id="detailContent" style="display:none;"></div>
  </div>
</div>

<div class="cell-tooltip" id="tooltip"></div>

var wrapper=document.getElementById('matrixWrapper');
var validCount=0,invalidCount=0;

function buildMatrix(){
  var c=document.createElement('div');c.className='matrix-header matrix-corner';wrapper.appendChild(c);
  YUNMUS.forEach(function(y){var h=document.createElement('div');h.className='matrix-header';h.textContent=y;wrapper.appendChild(h)});
  SHENMUS.forEach(function(sm){
    var lbl=document.createElement('div');lbl.className='matrix-row-label';lbl.textContent=sm;wrapper.appendChild(lbl);
    YUNMUS.forEach(function(ym){
      var combo=sm+ym,cell=document.createElement('div'),data=D[combo];
      if(data&&data.tones){
        cell.className='matrix-cell valid';cell.dataset.syllable=combo;
        var ft=data.tones[0];
        cell.innerHTML='<span class="pinyin-syllable">'+ft.t+'<br><small>'+ft.c+'</small></span>';
        (function(sy,el){el.addEventListener('click',function(){showDetail(sy,el)});el.addEventListener('mouseenter',function(e){showTooltip(e,sy)});el.addEventListener('mouseleave',hideTooltip)})(combo,cell);
        validCount++;
      } else {cell.className='matrix-cell invalid';cell.innerHTML='<span style="opacity:.3">—</span>';invalidCount++}
      wrapper.appendChild(cell);
    });
  });
  document.getElementById('validCount').textContent=validCount;
  document.getElementById('invalidCount').textContent=invalidCount;
}

function showDetail(syllable,cellEl){
  document.querySelectorAll('.matrix-cell.valid').forEach(function(c){c.classList.remove('active')});
  cellEl.classList.add('active');
  var data=D[syllable];if(!data||!data.tones){showEmpty();return}
  var panel=document.getElementById('detailPanel'),empty=document.getElementById('emptyState'),content=document.getElementById('detailContent');
  empty.style.display='none';content.style.display='block';panel.classList.add('active');
  var labels=['一声（阴平）','二声（阳平）','三声（上声）','四声（去声）'],html='<div class="detail-header"><span class="detail-title">'+syllable+'</span><button class="detail-close" onclick="hideDetail()">✕</button></div><div class="tone-grid">';
  data.tones.forEach(function(to,i){var tn=(i%4)+1;
    var tstr=to.t.replace(/'/g,"\\'");
    html+='<div class="tone-card" data-tone="'+tn+'"><div class="tone-card-header"><span class="tone-label">'+labels[tn-1]+'</span><button class="speak-btn" onclick="speak(\''+tstr+'\')">🔊</button></div><div class="tone-syllable">'+to.c+' '+to.t+'</div>';
    html+='<div class="words-list" style="margin-top:6px">';
    data.words.forEach(function(w){var wstr=w.replace(/'/g,"\\'");html+='<span class="word-tag" onclick="speakWord(\''+wstr+'\')">'+w+'</span>'});
    html+='</div></div>';
  });
  html+='</div><div class="words-section"><h3>📖 完整词语列表</h3><div class="words-list">';
  data.words.forEach(function(w){var wstr=w.replace(/'/g,"\\'");html+='<span class="word-tag" onclick="speakWord(\''+wstr+'\')">'+w+'</span>'});
  html+='</div></div>';content.innerHTML=html;
  if(window.innerWidth<768)panel.scrollIntoView({behavior:'smooth',block:'start'});
}

function showEmpty(){document.getElementById('emptyState').style.display='block';document.getElementById('detailContent').style.display='none';document.getElementById('detailPanel').classList.remove('active')}

function speak(text){
  if(!window.speechSynthesis){alert('浏览器不支持语音功能');return}
  window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.rate=0.8;
  var voices=window.speechSynthesis.getVoices(),zh=null;
  for(var i=0;i<voices.length;i++){if(voices[i].lang.startsWith('zh')){zh=voices[i];break}}
  if(zh)u.voice=zh;
  window.speechSynthesis.speak(u);
}
function speakWord(w){speak(w)}

var tooltip=document.getElementById('tooltip');
function showTooltip(e,syl){
  var data=D[syl];if(!data||!data.tones)return;var ft=data.tones[0],tip=syl+': '+ft.c+' ('+ft.t+')';
  if(data.words&&data.words.length)tip+=' | '+data.words.slice(0,3).join('、');
  tooltip.textContent=tip;tooltip.classList.add('visible');var r=e.target.getBoundingClientRect();
  tooltip.style.left=r.left+'px';tooltip.style.top=(r.bottom+4)+'px';
}
function hideTooltip(){tooltip.classList.remove('visible')}

document.getElementById('searchInput').addEventListener('input',function(e){
  var q=e.target.value.trim().toLowerCase();
  document.querySelectorAll('.matrix-cell.valid').forEach(function(cell){cell.style.opacity='';cell.style.boxShadow=''});
  if(!q)return;
  Object.keys(D).forEach(function(syl){
    var cell=document.querySelector('[data-syllable="'+syl+'"]');if(!cell)return;
    var data=D[syl],match=syl.indexOf(q)>=0;
    if(!match&&data)match=data.tones.some(function(t){return t.c.indexOf(q)>=0||t.t.toLowerCase().indexOf(q)>=0});
    if(!match&&data&&data.words)match=data.words.some(function(w){return w.indexOf(q)>=0});
    if(match){cell.style.opacity='1';cell.style.boxShadow='0 0 0 3px #fbbf24'}
    else{cell.style.opacity='0.25';cell.style.boxShadow=''}
  });
});

var themeBtn=document.getElementById('themeToggle');
var saved=localStorage.getItem('pinyin-theme')||'light';
function setTheme(t){document.documentElement.setAttribute('data-theme',t);themeBtn.textContent=t==='dark'?'☀️':'🌙';localStorage.setItem('pinyin-theme',t)}
setTheme(saved);
themeBtn.addEventListener('click',function(){setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')});

buildMatrix();
if(window.speechSynthesis)window.speechSynthesis.getVoices();
</script>
